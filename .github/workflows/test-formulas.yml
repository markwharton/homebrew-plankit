name: Test formulas

on:
  push:
    branches: [develop, main]
    paths:
      - "Formula/**"
      - "formulas.yml"
      - "scripts/**"
      - ".github/workflows/test-formulas.yml"
  pull_request:
    paths:
      - "Formula/**"
      - "formulas.yml"
      - "scripts/**"
      - ".github/workflows/test-formulas.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        # One runner per release artifact: darwin-arm64, darwin-amd64,
        # linux-amd64, linux-arm64.
        os: [macos-latest, macos-15-intel, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        run: |
          if ! command -v brew >/dev/null 2>&1 && [ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
      - name: Smoke test formulas
        run: |
          for formula in $(ruby -ryaml -e 'puts YAML.load_file("formulas.yml").fetch("formulas").map { |f| f.fetch("formula") }'); do
            scripts/test-formula.sh "$formula"
          done
